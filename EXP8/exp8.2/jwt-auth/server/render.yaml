services:
  - type: web
    name: jwt-auth-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        value: exp8_2_jwt_super_secret_key_2024
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CLIENT_URL
        value: "*"
